name: AI Stock Bot Scheduler

on:
  workflow_dispatch:      # ปุ่มกดรันเองสำหรับทดสอบ
  schedule:
    - cron: '0 */4 * * *' # รันทุกวันเวลา 4ชั่วโมง

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 yfinance requests ta google-generativeai
          pip install pandas-ta-classic matplotlib scikit-learn python-telegram-bot
         

      - name: 4. Run AI Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN}}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID}}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TICKER_SYMBOL: "^GSPC,GC=F,BTC-USD,NVDA"
        run:  
          python stock_bot.py
          python telegram_bot.py
      - name: 5. Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # เช็กว่ามีไฟล์สร้างขึ้นมาจริงไหมก่อน Add
          git add signal_log.json model.pkl chart.png || echo "No files to add"
          # บันทึกข้อมูล (ถ้าไม่มีอะไรเปลี่ยนจะไม่ Error)
          git commit -m "🤖 Update logs and ML model [skip ci]" || echo "No changes to commit"
          # ดันข้อมูลขึ้น Repo
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: AI Stock Bot Scheduler

on:
  workflow_dispatch:      # ปุ่มกดรันเองสำหรับทดสอบ
  schedule:
    - cron: '0 1 * * *'  # รันทุกวันเวลา 8 โมงเช้าไทย

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Libs
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 yfinance requests ta google-generativeai
          pip install pandas-ta-classic
         

      - name: 4. Run AI Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TICKER_SYMBOL: "^GSPC"
        run: python stock_bot.py
